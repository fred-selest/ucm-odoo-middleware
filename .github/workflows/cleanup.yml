name: Cleanup

on:
  schedule:
    # Tous les dimanches à 2h du matin
    - cron: '0 2 * * 0'
  workflow_dispatch:

env:
  RETENTION_DAYS: 30

jobs:
  cleanup-packages:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete old container images
        uses: actions/delete-package-versions@v4
        with:
          package-name: 'ucm-odoo-middleware'
          package-type: 'container'
          min-versions-to-keep: 10
          delete-only-untagged-versions: true

  cleanup-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Cleanup old call history
        run: |
          node -e "
          const CallHistory = require('./src/infrastructure/database/CallHistory');
          const history = new CallHistory();
          history.init().then(() => {
            history.cleanupOldData(365).then(deleted => {
              console.log('Deleted', deleted, 'old records');
              process.exit(0);
            });
          });
          "
        env:
          DB_PATH: /tmp/test.db
