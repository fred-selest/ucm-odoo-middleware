# Docker Compose Override pour développement local
# Ce fichier surcharge docker-compose.yml avec les configurations de dev

services:
  middleware:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: ucm_odoo_middleware_dev
    
    # Mode développement : volumes bind pour hot-reload
    volumes:
      - ./src:/app/src:rw
      - ./logs:/app/logs:rw
      - ./data:/app/data:rw
      - /app/node_modules  # Volume anonyme pour préserver node_modules
    
    # Variables d'environnement de développement
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - DB_PATH=/app/data/middleware.db
    
    # Port exposé pour accès local
    ports:
      - "3000:3000"
    
    # Redémarrage automatique en cas de crash
    restart: "no"
    
    # Ressources augmentées pour le développement
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    
    # Pas de healthcheck en dev pour éviter les faux positifs
    healthcheck:
      disable: true

