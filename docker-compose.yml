services:
  middleware:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ucm-odoo-middleware:latest
    container_name: ucm_odoo_middleware
    hostname: ucm-odoo-middleware
    user: root
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - .env
    networks:
      - proxy-net
    ports:
      - "3000:3000"
    volumes:
      - /opt/stacks/ucm-odoo-middleware/data:/app/data:rw
      - ./src/logger.js:/app/src/logger.js:ro
      - ./src/infrastructure/database/CallHistory.js:/app/src/infrastructure/database/CallHistory.js:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - NODE_ENV=production
      - TZ=Europe/Paris
      - DB_PATH=/tmp/middleware.db
    entrypoint: ["/bin/sh", "-c", "cp /app/data/middleware.db /tmp/middleware.db 2>/dev/null || true; chmod 666 /tmp/middleware.db 2>/dev/null || true; exec gosu nodejs node src/index.js"]
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    healthcheck:
      test:
        - CMD
        - curl
        - -sf
        - http://localhost:3000/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  proxy-net:
    external: true
