services:
  middleware:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ucm-odoo-middleware:latest
    container_name: ucm_odoo_middleware
    hostname: ucm-odoo-middleware
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - .env
    networks:
      - proxy-net
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./src/logger.js:/app/src/logger.js:ro
      - ./src/infrastructure/database/CallHistory.js:/app/src/infrastructure/database/CallHistory.js:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - NODE_ENV=production
      - TZ=Europe/Paris
      - DB_PATH=/app/data/middleware.db
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    healthcheck:
      test:
        - CMD
        - curl
        - -sf
        - http://localhost:3000/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  proxy-net:
    external: true
